kind = "web"
previewPath = "/mindline-showcase/"
title = "Mindline Showcase"
version = "1.0.0"
id = "artifacts/mindline-showcase"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/mindline-showcase/" ]
localPort = 22974

[services.development]
run = "pnpm --filter @workspace/mindline-showcase run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mindline-showcase", "run", "build" ]
publicDir = "artifacts/mindline-showcase/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22974"
BASE_PATH = "/mindline-showcase/"
